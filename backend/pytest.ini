[pytest]
# Pytest 配置文件

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 标记定义
markers =
    integration: Integration tests that require external services (OpenClaw Gateway, etc.)
    slow: Slow running tests
    unit: Unit tests (default)

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 异步测试支持
asyncio_mode = auto

# 覆盖率配置
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
